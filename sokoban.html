<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推箱子 · 十关挑战</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 55%, #fef3c7 100%);
      color: #0f172a;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }

    .panel,
    .board-panel,
    .modal-content {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .panel {
      padding: 24px;
    }

    .board-panel {
      padding: 24px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtext {
      font-size: 14px;
      line-height: 1.7;
      color: #475569;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f8fafc;
      border-radius: 18px;
      padding: 16px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    .stat-mini {
      margin-top: 4px;
      font-size: 12px;
      color: #64748b;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary-btn {
      background: #0f172a;
      color: #ffffff;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .hint-box {
      min-height: 110px;
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #334155;
      font-size: 14px;
      line-height: 1.8;
    }

    .hint-title {
      font-weight: 700;
      color: #b45309;
      margin-bottom: 6px;
    }

    .level-list {
      margin-top: 16px;
    }

    .level-list-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #334155;
    }

    .level-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .level-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e2e8f0;
      color: #0f172a;
    }

    .level-btn.current {
      background: #0f172a;
      color: #ffffff;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }

    .board-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 6px 12px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    .board-wrap {
      overflow: auto;
      border-radius: 24px;
      background: #e2e8f0;
      padding: 16px;
    }

    .board-inner {
      width: fit-content;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 16px;
      box-shadow: inset 0 1px 8px rgba(15, 23, 42, 0.08);
    }

    .board {
      display: grid;
      gap: 4px;
      outline: none;
    }

    .tile {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      position: relative;
      border: 1px solid #f1f5f9;
      background: #fefce8;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.06);
    }

    .tile.wall {
      background: #334155;
      border-color: #475569;
    }

    .tile.wall::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 10px;
      background: rgba(100, 116, 139, 0.5);
    }

    .tile.target::before,
    .tile.box-target::before,
    .tile.player-target::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 999px;
      border: 4px dashed #fda4af;
    }

    .tile.box::after,
    .tile.box-target::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 12px;
      background: #f59e0b;
      border: 1px solid #b45309;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
    }

    .tile.player .player-core,
    .tile.player-target .player-core {
      position: absolute;
      inset: 6px;
      border-radius: 999px;
      background: #0ea5e9;
      border: 1px solid #0369a1;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.12);
    }

    .tile.player .player-core::after,
    .tile.player-target .player-core::after {
      content: "";
      position: absolute;
      inset: 30%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
    }

    .controls {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr;
      gap: 12px;
      align-items: center;
    }

    .middle-controls {
      display: flex;
      gap: 12px;
    }

    .middle-controls button {
      flex: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .overlay.show {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 560px;
      padding: 24px;
    }

    .modal-top {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .trophy-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: #fef3c7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-subtext {
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
    }

    .modal-level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 980px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px;
      }

      .panel,
      .board-panel,
      .modal-content {
        border-radius: 20px;
      }

      .stats,
      .button-grid,
      .level-grid,
      .modal-level-grid,
      .controls {
        grid-template-columns: 1fr;
      }

      .middle-controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      .tile {
        width: 36px;
        height: 36px;
        border-radius: 10px;
      }

      .board-title,
      .title,
      .modal-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="container">
      <section class="panel">
        <h1 class="title">推箱子 · 十关挑战</h1>
        <p class="subtext">方向键 / WASD 移动角色，把所有箱子推到目标点上即可过关。</p>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">当前关卡</div>
            <div class="stat-value" id="current-level-name"></div>
            <div class="stat-mini" id="current-level-difficulty"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">通关进度</div>
            <div class="stat-value" id="progress-text"></div>
            <div class="stat-mini">全部关卡均可自由选择</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">步数</div>
            <div class="stat-value" id="moves-text"></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">状态</div>
            <div class="stat-value" id="status-text"></div>
          </div>
        </div>

        <div class="button-grid">
          <button class="primary-btn" id="hint-btn">提示</button>
          <button class="secondary-btn" id="undo-btn">撤回</button>
          <button class="secondary-btn" id="reset-btn">重开本关</button>
          <button class="secondary-btn" id="reload-btn">重新加载</button>
        </div>

        <div class="hint-box">
          <div class="hint-title">提示区</div>
          <div id="hint-text">点击“提示”可获得下一步建议。</div>
        </div>

        <div class="level-list">
          <div class="level-list-title">关卡选择</div>
          <div class="level-grid" id="level-grid"></div>
        </div>
      </section>

      <section class="board-panel">
        <div class="board-header">
          <div>
            <h2 class="board-title" id="board-level-title"></h2>
            <p class="subtext">所有关卡均可自由选择，难度整体按顺序递增。</p>
          </div>
          <div class="tags">
            <span class="tag">方向键 / WASD</span>
            <span class="tag">支持撤回</span>
            <span class="tag">智能提示</span>
          </div>
        </div>

        <div class="board-wrap">
          <div class="board-inner">
            <div class="board" id="board" tabindex="0"></div>
          </div>
        </div>

        <div class="controls">
          <button class="primary-btn" id="up-btn">上</button>
          <div class="middle-controls">
            <button class="primary-btn" id="left-btn">左</button>
            <button class="primary-btn" id="down-btn">下</button>
            <button class="primary-btn" id="right-btn">右</button>
          </div>
          <button class="secondary-btn" id="hint-btn-2">不会了，给我提示</button>
        </div>
      </section>
    </div>
  </div>

  <div class="overlay" id="win-overlay">
    <div class="modal-content">
      <div class="modal-top">
        <div class="trophy-icon">🏆</div>
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-subtext" id="modal-subtext"></div>
        </div>
      </div>

      <div class="modal-level-grid" id="modal-level-grid"></div>

      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script>
    const LEVELS_RAW = [
      {
        id: 1,
        name: "第 1 关",
        difficulty: "入门",
        map: [
          "#######",
          "#.....#",
          "#.P...#",
          "#.B...#",
          "#.T...#",
          "#.....#",
          "#######"
        ]
      },
      {
        id: 2,
        name: "第 2 关",
        difficulty: "入门+",
        map: [
          "########",
          "#......#",
          "#.P....#",
          "#.BB...#",
          "#.TT...#",
          "#......#",
          "########"
        ]
      },
      {
        id: 3,
        name: "第 3 关",
        difficulty: "简单",
        map: [
          "########",
          "#......#",
          "#.P....#",
          "#.B#...#",
          "#.T.B..#",
          "#...T..#",
          "#......#",
          "########"
        ]
      },
      {
        id: 4,
        name: "第 4 关",
        difficulty: "简单+",
        map: [
          "#########",
          "#.......#",
          "#..P....#",
          "#..B.B..#",
          "#...#...#",
          "#..T.T..#",
          "#.......#",
          "#########"
        ]
      },
      {
        id: 5,
        name: "第 5 关",
        difficulty: "中等",
        map: [
          "#########",
          "#.......#",
          "#..P.B..#",
          "#..##...#",
          "#..T.B..#",
          "#..##T..#",
          "#.......#",
          "#########"
        ]
      },
      {
        id: 6,
        name: "第 6 关",
        difficulty: "中等+",
        map: [
          "##########",
          "#........#",
          "#..P.....#",
          "#..BB....#",
          "#...#....#",
          "#..TT....#",
          "#........#",
          "##########"
        ]
      },
      {
        id: 7,
        name: "第 7 关",
        difficulty: "进阶",
        map: [
          "##########",
          "#........#",
          "#..P..B..#",
          "#..##.#..#",
          "#..B..T..#",
          "#..##.T..#",
          "#........#",
          "##########"
        ]
      },
      {
        id: 8,
        name: "第 8 关",
        difficulty: "进阶+",
        map: [
          "###########",
          "#.........#",
          "#..P......#",
          "#..BB.....#",
          "#..#..#...#",
          "#..T..B...#",
          "#..#..T...#",
          "#.....T...#",
          "#.........#",
          "###########"
        ]
      },
      {
        id: 9,
        name: "第 9 关",
        difficulty: "困难",
        map: [
          "############",
          "#..........#",
          "#..P.B.....#",
          "#..##.#....#",
          "#..B..#....#",
          "#..#..B....#",
          "#..T..#....#",
          "#..#..T....#",
          "#.....T....#",
          "#..........#",
          "############"
        ]
      },
      {
        id: 10,
        name: "第 10 关",
        difficulty: "挑战",
        map: [
          "#############",
          "#...........#",
          "#..P....#...#",
          "#..BB...#...#",
          "#..#..###...#",
          "#..#....B...#",
          "#..T..#.....#",
          "#..#..T.....#",
          "#.....T.....#",
          "#...........#",
          "#############"
        ]
      }
    ];

    const DIRS = {
      U: { dx: 0, dy: -1, label: "上" },
      D: { dx: 0, dy: 1, label: "下" },
      L: { dx: -1, dy: 0, label: "左" },
      R: { dx: 1, dy: 0, label: "右" }
    };

    function posKey(x, y) {
      return `${x},${y}`;
    }

    function cloneState(state) {
      return {
        player: { x: state.player.x, y: state.player.y },
        boxes: state.boxes.map(box => ({ x: box.x, y: box.y }))
      };
    }

    function normalizeBoxes(boxes) {
      return boxes.map(box => `${box.x},${box.y}`).sort().join("|");
    }

    function stateHash(state) {
      return `${state.player.x},${state.player.y};${normalizeBoxes(state.boxes)}`;
    }

    function parseLevel(raw) {
      const height = raw.map.length;
      const width = Math.max(...raw.map.map(row => row.length));
      const walls = new Set();
      const targets = new Set();
      const boxes = [];
      let player = null;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const cell = raw.map[y][x] ?? "#";
          const key = posKey(x, y);
          if (cell === "#") walls.add(key);
          if (cell === "T" || cell === "*" || cell === "+") targets.add(key);
          if (cell === "B" || cell === "*") boxes.push({ x, y });
          if (cell === "P" || cell === "+") player = { x, y };
        }
      }

      return {
        ...raw,
        width,
        height,
        walls,
        targets,
        initialState: {
          player: player || { x: 1, y: 1 },
          boxes
        }
      };
    }

    const LEVELS = LEVELS_RAW.map(parseLevel);

    function isWall(level, x, y) {
      return level.walls.has(posKey(x, y));
    }

    function isTarget(level, x, y) {
      return level.targets.has(posKey(x, y));
    }

    function getBoxIndex(boxes, x, y) {
      return boxes.findIndex(box => box.x === x && box.y === y);
    }

    function isSolved(level, state) {
      return state.boxes.length > 0 && state.boxes.every(box => isTarget(level, box.x, box.y));
    }

    function tryMove(level, state, dirKey) {
      const dir = DIRS[dirKey];
      if (!dir) return null;

      const nextPlayerX = state.player.x + dir.dx;
      const nextPlayerY = state.player.y + dir.dy;
      if (isWall(level, nextPlayerX, nextPlayerY)) return null;

      const hitBoxIndex = getBoxIndex(state.boxes, nextPlayerX, nextPlayerY);
      const nextState = cloneState(state);

      if (hitBoxIndex >= 0) {
        const nextBoxX = nextPlayerX + dir.dx;
        const nextBoxY = nextPlayerY + dir.dy;
        if (isWall(level, nextBoxX, nextBoxY)) return null;
        if (getBoxIndex(state.boxes, nextBoxX, nextBoxY) >= 0) return null;
        nextState.boxes[hitBoxIndex] = { x: nextBoxX, y: nextBoxY };
      }

      nextState.player = { x: nextPlayerX, y: nextPlayerY };
      return nextState;
    }

    function buildGrid(level, state) {
      const boxSet = new Set(state.boxes.map(box => posKey(box.x, box.y)));
      const playerKey = posKey(state.player.x, state.player.y);
      const rows = [];

      for (let y = 0; y < level.height; y += 1) {
        const row = [];
        for (let x = 0; x < level.width; x += 1) {
          const key = posKey(x, y);
          if (level.walls.has(key)) row.push("wall");
          else if (playerKey === key && level.targets.has(key)) row.push("player-target");
          else if (playerKey === key) row.push("player");
          else if (boxSet.has(key) && level.targets.has(key)) row.push("box-target");
          else if (boxSet.has(key)) row.push("box");
          else if (level.targets.has(key)) row.push("target");
          else row.push("floor");
        }
        rows.push(row);
      }

      return rows;
    }

    function simpleDeadlock(level, state) {
      for (const box of state.boxes) {
        if (isTarget(level, box.x, box.y)) continue;
        const up = isWall(level, box.x, box.y - 1);
        const down = isWall(level, box.x, box.y + 1);
        const left = isWall(level, box.x - 1, box.y);
        const right = isWall(level, box.x + 1, box.y);
        if ((up || down) && (left || right)) return true;
      }
      return false;
    }

    function solveNextMove(level, startState, maxNodes = 15000) {
      if (isSolved(level, startState)) return [];

      const queue = [{ state: cloneState(startState), path: [] }];
      const visited = new Set([stateHash(startState)]);
      let index = 0;
      let expanded = 0;

      while (index < queue.length && expanded < maxNodes) {
        const current = queue[index];
        index += 1;
        expanded += 1;

        for (const dirKey of ["U", "D", "L", "R"]) {
          const nextState = tryMove(level, current.state, dirKey);
          if (!nextState) continue;
          if (simpleDeadlock(level, nextState)) continue;
          const hash = stateHash(nextState);
          if (visited.has(hash)) continue;
          const nextPath = current.path.concat(dirKey);
          if (isSolved(level, nextState)) return nextPath;
          visited.add(hash);
          queue.push({ state: nextState, path: nextPath });
        }
      }

      return null;
    }

    const state = {
      currentLevel: 0,
      level: LEVELS[0],
      gameState: cloneState(LEVELS[0].initialState),
      history: [],
      moves: 0,
      completed: new Set(),
      hintText: "点击“提示”可获得下一步建议。",
      showWin: false
    };

    const els = {
      currentLevelName: document.getElementById("current-level-name"),
      currentLevelDifficulty: document.getElementById("current-level-difficulty"),
      progressText: document.getElementById("progress-text"),
      movesText: document.getElementById("moves-text"),
      statusText: document.getElementById("status-text"),
      hintText: document.getElementById("hint-text"),
      levelGrid: document.getElementById("level-grid"),
      boardLevelTitle: document.getElementById("board-level-title"),
      board: document.getElementById("board"),
      winOverlay: document.getElementById("win-overlay"),
      modalTitle: document.getElementById("modal-title"),
      modalSubtext: document.getElementById("modal-subtext"),
      modalLevelGrid: document.getElementById("modal-level-grid"),
      modalActions: document.getElementById("modal-actions")
    };

    function completedCountAfterWin() {
      if (isSolved(state.level, state.gameState) && !state.completed.has(state.currentLevel)) {
        return state.completed.size + 1;
      }
      return state.completed.size;
    }

    function allCompleted() {
      return completedCountAfterWin() >= LEVELS.length;
    }

    function setHint(text) {
      state.hintText = text;
      els.hintText.textContent = text;
    }

    function loadLevel(index) {
      state.currentLevel = index;
      state.level = LEVELS[index];
      state.gameState = cloneState(state.level.initialState);
      state.history = [];
      state.moves = 0;
      state.showWin = false;
      setHint("点击“提示”可获得下一步建议。");
      render();
      els.board.focus();
    }

    function handleMove(dirKey) {
      if (isSolved(state.level, state.gameState)) return;
      const nextState = tryMove(state.level, state.gameState, dirKey);
      if (!nextState) return;
      state.history.push(cloneState(state.gameState));
      state.gameState = nextState;
      state.moves += 1;
      state.showWin = false;
      setHint("继续加油，必要时可以使用提示按钮。");
      if (isSolved(state.level, state.gameState)) {
        state.completed.add(state.currentLevel);
        state.showWin = true;
      }
      render();
    }

    function handleUndo() {
      if (state.history.length === 0) return;
      state.gameState = state.history.pop();
      state.moves = Math.max(0, state.moves - 1);
      state.showWin = false;
      setHint("已撤回上一步。");
      render();
    }

    function handleReset() {
      state.gameState = cloneState(state.level.initialState);
      state.history = [];
      state.moves = 0;
      state.showWin = false;
      setHint("本关已重置。点击提示可获得下一步建议。");
      render();
    }

    function handleHint() {
      const solution = solveNextMove(state.level, state.gameState);
      if (!solution || solution.length === 0) {
        setHint("当前局面暂时没有快速提示，请尝试重开或重新整理箱子位置。");
        return;
      }
      const nextLabels = solution.slice(0, 5).map(dir => DIRS[dir].label).join(" → ");
      setHint(`建议下一步：${DIRS[solution[0]].label}。参考后续 ${nextLabels}${solution.length > 5 ? " ..." : ""}`);
    }

    function createButton(text, className, onClick) {
      const button = document.createElement("button");
      button.className = className;
      button.textContent = text;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderLevelButtons() {
      els.levelGrid.innerHTML = "";
      LEVELS.forEach((level, index) => {
        const button = document.createElement("button");
        button.className = `level-btn${index === state.currentLevel ? " current" : ""}`;
        const left = document.createElement("span");
        left.textContent = `${level.id}. ${level.difficulty}`;
        const right = document.createElement("span");
        right.textContent = state.completed.has(index) ? "✓" : index === state.currentLevel ? "▶" : "○";
        button.appendChild(left);
        button.appendChild(right);
        button.addEventListener("click", () => loadLevel(index));
        els.levelGrid.appendChild(button);
      });
    }

    function renderBoard() {
      const grid = buildGrid(state.level, state.gameState);
      els.board.innerHTML = "";
      els.board.style.gridTemplateColumns = `repeat(${state.level.width}, minmax(0, 1fr))`;

      grid.forEach(row => {
        row.forEach(type => {
          const tile = document.createElement("div");
          tile.className = `tile ${type}`;
          if (type === "player" || type === "player-target") {
            const core = document.createElement("div");
            core.className = "player-core";
            tile.appendChild(core);
          }
          els.board.appendChild(tile);
        });
      });
    }

    function renderModal() {
      if (!state.showWin) {
        els.winOverlay.classList.remove("show");
        return;
      }

      els.winOverlay.classList.add("show");
      els.modalTitle.textContent = allCompleted() ? "全部通关！" : "通关成功！";
      els.modalSubtext.textContent = allCompleted()
        ? "恭喜你完成全部 10 个关卡，敬请期待推箱子第二版！"
        : `你已完成 ${state.level.name}，可自由选择下一关继续挑战。`;

      els.modalLevelGrid.innerHTML = "";
      LEVELS.forEach((level, index) => {
        const button = document.createElement("button");
        button.className = index === state.currentLevel ? "secondary-btn" : "primary-btn";
        button.textContent = `${level.id} · ${level.difficulty}`;
        button.addEventListener("click", () => loadLevel(index));
        els.modalLevelGrid.appendChild(button);
      });

      els.modalActions.innerHTML = "";
      if (!allCompleted() && state.currentLevel + 1 < LEVELS.length) {
        els.modalActions.appendChild(createButton("下一关", "primary-btn", () => loadLevel(state.currentLevel + 1)));
      }
      els.modalActions.appendChild(createButton(allCompleted() ? "返回选关继续游玩" : "留在当前页面", allCompleted() ? "primary-btn" : "secondary-btn", () => {
        state.showWin = false;
        renderModal();
      }));
      els.modalActions.appendChild(createButton(allCompleted() ? "重温当前关卡" : "再玩一次本关", "secondary-btn", handleReset));
    }

    function render() {
      els.currentLevelName.textContent = state.level.name;
      els.currentLevelDifficulty.textContent = state.level.difficulty;
      els.progressText.textContent = `${state.completed.size}/${LEVELS.length}`;
      els.movesText.textContent = String(state.moves);
      els.statusText.textContent = isSolved(state.level, state.gameState) ? "已通关" : "进行中";
      els.boardLevelTitle.textContent = state.level.name;
      els.hintText.textContent = state.hintText;
      renderLevelButtons();
      renderBoard();
      renderModal();
    }

    document.getElementById("hint-btn").addEventListener("click", handleHint);
    document.getElementById("hint-btn-2").addEventListener("click", handleHint);
    document.getElementById("undo-btn").addEventListener("click", handleUndo);
    document.getElementById("reset-btn").addEventListener("click", handleReset);
    document.getElementById("reload-btn").addEventListener("click", () => loadLevel(state.currentLevel));
    document.getElementById("up-btn").addEventListener("click", () => handleMove("U"));
    document.getElementById("down-btn").addEventListener("click", () => handleMove("D"));
    document.getElementById("left-btn").addEventListener("click", () => handleMove("L"));
    document.getElementById("right-btn").addEventListener("click", () => handleMove("R"));

    window.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: "U",
        ArrowDown: "D",
        ArrowLeft: "L",
        ArrowRight: "R",
        w: "U",
        W: "U",
        s: "D",
        S: "D",
        a: "L",
        A: "L",
        d: "R",
        D: "R"
      };
      const dir = keyMap[event.key];
      if (!dir) return;
      event.preventDefault();
      handleMove(dir);
    });

    els.winOverlay.addEventListener("click", event => {
      if (event.target === els.winOverlay) {
        state.showWin = false;
        renderModal();
      }
    });

    render();
    els.board.focus();
  </script>
</body>
</html
